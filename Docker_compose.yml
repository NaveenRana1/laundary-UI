services:
  backend:
    build: C:/Users/nr480/PycharmProjects/FastAPIProject/Booking_beckend
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: C:/Users/nr480/OneDrive/React/index/react/Frontend
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ranaji
      POSTGRES_DB: Naveen_Server
    ports:
      - "2004:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis-server
    ports:
      - "6379:6379"

volumes:
  postgres_data: